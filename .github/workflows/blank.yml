# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo Hello, world!

      # Runs a set of commands using the runners shell
      - name: Run a multi-line script
        run: |
          echo Add other actions to build,
          echo test, and deploy your project.
            - name: APK action
  # You may pin to the exact commit or the version.
  # uses: WaterLemons2k/apk-action@6872ea1c0a08c2646b5a9cfd7d5262659050c0ff
  uses: WaterLemons2k/apk-action@v1.1.2
  with:
    # Contents of the keystore file (.jks), base64 encoded
    keystore: 
    # Password of the keystore
    keystore-password: 
    # Alias of the key
    key-alias: 
    # Password of the key
    key-password: 
    # The Java version to set up
    java-version: # optional
    # The arguments passed to Gradle
    gradle-args: # optional, default is --no-daemon
    # Build a release or debug APK
    release: # optional, default is true
            - name: Build apk
  # You may pin to the exact commit or the version.
  # uses: MirkoMajkicProductDock/BuildAPK@24cc2d17f0c8e391166603bffe50f207b9d75859
  uses: MirkoMajkicProductDock/BuildAPK@v0.0.1
  with:
    # Pass the flavour you want to build artefacts for
    flavour: # optional, default is release
          
