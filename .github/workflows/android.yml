name: Android CI/CD

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Create Dummy Environment Files
      run: |
        echo "GEMINI_API_KEY=dummy_key_for_ci_build" > .env
        echo "GEMINI_API_KEY=dummy_key_for_ci_build" > .env.example

    - name: Grant Execute Permission to Gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: dawwer-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Root APK and ZIP Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dawwer-root-files
        path: |
          dawwer.apk
          dawwer.zip
